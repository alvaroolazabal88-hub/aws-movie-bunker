<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Movie Bunker</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        /* 1. Scrollable Grid Structure */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
            max-height: 80vh; /* Set height for scrolling */
            overflow-y: auto; /* Enable vertical scroll */
        }
        .movie-card {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .movie-title { font-size: 1.2em; margin-bottom: 15px; }
        /* 2. Download Button Style */
        .download-btn {
            background-color: #e50914; /* Netflix Red */
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }
        .download-btn:hover { background-color: #b20710; }
    </style>
</head>
<body>
    <h1>🎬 Welcome to the Movie Bunker</h1>
    <p>Click to download and watch securely via CloudFront + HTTPS</p>
    
    <div class="movie-grid" id="movie-grid">
        </div>

    <script>
        // --- CONFIGURATION ---
        // Replace this with your actual CloudFront URL from Terraform output
        const CLOUDFRONT_URL = "https://your-distribution-id.cloudfront.net"; 

        // For this basic example, we hardcode the movies. 
        // A pro app would fetch this list dynamically.
        const movies = [
            { title: "Matrix (720p)", file: "matrix.mp4" },
            { title: "Inception (720p)", file: "inception.mp4" },
            { title: "Interstellar (720p)", file: "interstellar.mp4" },
            { title: "The Godfather", file: "godfather.mp4" },
            { title: "Pulp Fiction", file: "pulpfiction.mp4" },
            { title: "Fight Club", file: "fightclub.mp4" }
        ];

        const grid = document.getElementById('movie-grid');

        // --- GENERATE THE UI ---
        movies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';

            const fullUrl = `${CLOUDFRONT_URL}/${movie.file}`;

            card.innerHTML = `
                <div class="movie-title">${movie.title}</div>
                <a href="${fullUrl}" class="download-btn" download="${movie.file}">
                    Download Movie
                </a>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
